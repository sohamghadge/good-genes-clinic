name: Update Analytics & Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-analytics:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Checkout SEO analytics repo
        uses: actions/checkout@v4
        with:
          repository: sohamghadge/dr-dipti-seo-analytics
          path: seo-analytics
          token: ${{ secrets.PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: cd seo-analytics && npm ci

      - name: Fetch GA4 data and update mock-data.ts
        run: cd seo-analytics && node scripts/update-mock-data.mjs

      - name: Build dashboard
        run: cd seo-analytics && npm run build

      - name: Copy build to portfolio
        run: |
          rm -rf login-analytics
          cp -r seo-analytics/dist login-analytics

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add login-analytics/
          git diff --staged --quiet || (git commit -m "Auto-update analytics $(date -u +%Y-%m-%d)" && git push)

  deploy:
    if: always()
    needs: [update-analytics]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/good-genes-clinic
            sudo git pull
